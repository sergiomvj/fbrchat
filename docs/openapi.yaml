openapi: 3.1.0
info:
  title: FBR CHAT Local API
  version: 0.1.0
  description: Starter OpenAPI contract for the local autonomous implementation.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service health
  /api/auth/login:
    post:
      summary: Login with seeded local credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Access and refresh tokens
  /api/bootstrap:
    get:
      summary: Load current user chat bootstrap payload
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bootstrap payload
  /api/messages:
    post:
      summary: Send a message through the HTTP fallback pipeline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_type, room_id]
              properties:
                room_type:
                  type: string
                  enum: [group, pvt]
                room_id:
                  type: string
                content:
                  type: string
                  nullable: true
                media_type:
                  type: string
                  nullable: true
                media_url:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Persisted message event payload
  /api/uploads:
    post:
      summary: Validate and create a local upload descriptor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, mime_type, size_bytes]
              properties:
                filename:
                  type: string
                mime_type:
                  type: string
                size_bytes:
                  type: integer
      responses:
        "201":
          description: Local upload descriptor
  /api/admin/settings:
    get:
      summary: Read system settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current system settings
    put:
      summary: Update system settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated system settings
  /api/admin/logs/openclaw:
    get:
      summary: Inspect local OpenClaw call logs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OpenClaw log list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
