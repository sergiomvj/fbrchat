version: '3.8'

services:
  # Base Infrastructure
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fbr_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fbr_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fbr_network

  minio:
    image: minio/minio:RELEASE.2024-03-30T09-45-56Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - fbr_network

  # Application Services
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - fbr_network

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
      - minio
      - backend
    networks:
      - fbr_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - fbr_network

  # Reverse Proxy & SSL (Optional gateway mapping)
  nginx-proxy:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/fbr-chat.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - fbr_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  fbr_network:
    driver: bridge
